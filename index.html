<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Chi Tiêu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Fix khoảng trống dưới cùng để cuộn không bị vướng thanh menu cố định */
        main { padding-bottom: 90px; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900 overflow-hidden">

    <!-- Loading Overlay (Chỉ dùng cho lúc mới vào app) -->
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="ph ph-spinner-gap text-4xl text-indigo-600 animate-spin mb-4"></i>
        <p id="loader-text" class="text-sm font-medium text-slate-500">Đang đồng bộ dữ liệu đám mây...</p>
    </div>

    <!-- Container chính -->
    <div id="app-root" class="max-w-md mx-auto h-screen bg-slate-50 relative shadow-2xl overflow-hidden sm:border-x sm:border-slate-200 flex flex-col">
        <!-- Nội dung ứng dụng sẽ được JavaScript render vào đây -->
    </div>

    <!-- Tích hợp Firebase SDK (Sử dụng Compat version cho HTML tĩnh) -->
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Cấu hình Firebase Database cá nhân của Huy Chu
        const firebaseConfig = {
            apiKey: "AIzaSyACL12yLGdCMLe7GY2rlVbE56mh_HcQEbw",
            authDomain: "qltkcn.firebaseapp.com",
            projectId: "qltkcn",
            storageBucket: "qltkcn.firebasestorage.app",
            messagingSenderId: "271958756874",
            appId: "1:271958756874:web:3e8d418df901a5684719f3",
            measurementId: "G-S72MTV26B8"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DANH MỤC MẶC ĐỊNH (Khi DB trống)
        const defaultCategories = [
            { id: 'c1', name: 'Ăn uống', type: 'expense', color: 'bg-orange-500' },
            { id: 'c2', name: 'Di chuyển', type: 'expense', color: 'bg-blue-500' },
            { id: 'c3', name: 'Hóa đơn', type: 'expense', color: 'bg-red-500' },
            { id: 'c4', name: 'Giải trí', type: 'expense', color: 'bg-purple-500' },
            { id: 'c5', name: 'Lương', type: 'income', color: 'bg-green-500' },
            { id: 'c6', name: 'Thưởng', type: 'income', color: 'bg-emerald-400' },
        ];

        // GLOBAL STATE QUẢN LÝ TOÀN BỘ APP
        const state = {
            activeTab: 'home',
            wallets: [],
            transactions: [],
            categories: [],
            userId: 'huychu_master_database', // ID cố định để đồng bộ xuyên thiết bị
            isDataLoaded: false,
            txForm: { id: null, type: 'expense', amount: '', date: '', time: '', walletId: '', categoryId: '', note: '', hasImage: false },
            walletForm: { id: null, type: 'cash', name: '', balance: '', limit: '', includeInNet: true },
            confirmingDeleteTxId: null,
            confirmingDeleteWalletId: null,
            dashboardFilter: { period: 'month', walletId: 'all', customStart: '', customEnd: '' }, // Bộ lọc màn hình Tổng quan
            viewingEntity: { type: null, id: null }, // Chứa dữ liệu khi Drill-down ('wallet' or 'category')
            detailFilterPeriod: 'all', // Bộ lọc thời gian bên trong màn hình Drill-down
            syncErrorMsg: '' // Chứa text hiển thị lỗi kết nối nếu có
        };

        // Format VND
        const formatVND = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount || 0);
        // Chọn icon tùy theo loại ví
        const getWalletIcon = (type) => type === 'cash' ? '<i class="ph-fill ph-coins"></i>' : type === 'debit' ? '<i class="ph-fill ph-bank"></i>' : '<i class="ph-fill ph-credit-card"></i>';

        // HÀM LỌC GIAO DỊCH LÕI (Dùng cho mọi nơi cần filter)
        const filterTransactions = (txs, filterOptions) => {
            let filtered = txs;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            // 1. Lọc theo Nguồn tiền
            if (filterOptions.walletId && filterOptions.walletId !== 'all') {
                filtered = filtered.filter(t => t.walletId === filterOptions.walletId);
            }

            // 2. Lọc theo Thời gian
            if (filterOptions.period === 'day') {
                // Hôm nay
                filtered = filtered.filter(t => t.date === todayStr);
            } else if (filterOptions.period === 'week') {
                // Tuần này (Thứ 2 đến Chủ nhật)
                const startOfWeek = new Date(now); 
                const day = startOfWeek.getDay();
                const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1); // Điều chỉnh ngày Chủ nhật (0) thành cuối tuần
                startOfWeek.setDate(diff);
                startOfWeek.setHours(0,0,0,0);
                
                const endOfWeek = new Date(startOfWeek); 
                endOfWeek.setDate(startOfWeek.getDate() + 6);
                endOfWeek.setHours(23,59,59,999);

                filtered = filtered.filter(t => { 
                    const d = new Date(`${t.date}T${t.time || '12:00'}:00`); 
                    return d >= startOfWeek && d <= endOfWeek; 
                });
            } else if (filterOptions.period === 'month') {
                // Tháng này
                const currentMonth = now.getMonth(); const currentYear = now.getFullYear();
                filtered = filtered.filter(t => { 
                    const d = new Date(t.date); 
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear; 
                });
            } else if (filterOptions.period === 'year') {
                // Năm nay
                const currentYear = now.getFullYear();
                filtered = filtered.filter(t => { const d = new Date(t.date); return d.getFullYear() === currentYear; });
            } else if (filterOptions.period === 'custom' && filterOptions.customStart && filterOptions.customEnd) {
                // Tùy chọn (Từ ngày - Đến ngày)
                const start = new Date(filterOptions.customStart); start.setHours(0,0,0,0);
                const end = new Date(filterOptions.customEnd); end.setHours(23,59,59,999);
                filtered = filtered.filter(t => { 
                    const d = new Date(`${t.date}T${t.time || '12:00'}:00`); 
                    return d >= start && d <= end; 
                });
            }
            return filtered;
        };

        // Hàm tính các chỉ số cho thẻ Tổng quan (TS Ròng, Thu, Chi, Chi Tài khoản, Nợ tín dụng)
        const getStats = () => {
            let totalBalance = 0, totalExpense = 0, totalIncome = 0;
            let totalCash = 0, totalCredit = 0;
            let accountExpense = 0, creditExpense = 0;

            // Tính Tổng Tài Sản Ròng
            state.wallets.filter(w => w.status !== 'deleted').forEach(w => {
                if (w.includeInNet === false) return; // Bỏ qua nếu user chọn không tính
                
                if (w.type === 'credit') {
                    totalCredit += Math.abs(w.balance); // Dư nợ thẻ (số dương để hiển thị)
                } else {
                    totalCash += w.balance; // Tiền đang có
                }
            });
            // TÀI SẢN RÒNG = (TIỀN MẶT + ATM) - DƯ NỢ TÍN DỤNG
            totalBalance = totalCash - totalCredit;
            
            // Tính Tổng Thu / Tổng Chi theo bộ lọc
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter);
            filteredTxs.forEach(t => {
                if (t.type === 'expense') {
                    totalExpense += t.amount;
                    // Bóc tách chi tiêu từ Tài khoản vs Thẻ tín dụng
                    const wallet = state.wallets.find(w => w.id === t.walletId);
                    if (wallet && wallet.type === 'credit') {
                        creditExpense += t.amount;
                    } else {
                        accountExpense += t.amount;
                    }
                }
                if (t.type === 'income') totalIncome += t.amount;
            });
            
            return { totalBalance, totalExpense, totalIncome, accountExpense, creditExpense, totalCredit };
        };

        // Hàm thống kê tỷ trọng chi tiêu (Cơ cấu chi tiêu)
        const getCategoryStats = () => {
            const stats = {};
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter).filter(t => t.type === 'expense');
            const totalE = filteredTxs.reduce((sum, t) => sum + t.amount, 0);

            filteredTxs.forEach(t => {
                if (!stats[t.categoryId]) stats[t.categoryId] = { total: 0, byWallet: {} };
                stats[t.categoryId].total += t.amount;
                // Bóc tách khoản chi đó được chi từ ví nào
                if(!stats[t.categoryId].byWallet[t.walletId]) stats[t.categoryId].byWallet[t.walletId] = 0;
                stats[t.categoryId].byWallet[t.walletId] += t.amount;
            });

            // Chuyển Object thành Mảng và sắp xếp giảm dần theo số tiền
            return Object.entries(stats).map(([id, data]) => ({
                category: state.categories.find(c => c.id === id) || { name: 'Đã xóa', color: 'bg-slate-400' },
                amount: data.total,
                byWallet: data.byWallet,
                percentage: totalE > 0 ? (data.total / totalE) * 100 : 0
            })).sort((a, b) => b.amount - a.amount);
        };

        // Hàm nhóm giao dịch theo Ngày
        const getGroupedTransactions = (txsToGroup) => {
            const groups = {};
            txsToGroup.forEach(t => {
                if (!groups[t.date]) groups[t.date] = [];
                groups[t.date].push(t);
            });
            // Sắp xếp ngày mới nhất lên đầu, giao dịch trong ngày cũng sắp xếp theo ID (thời gian tạo)
            return Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).map(date => ({
                date, items: groups[date].sort((a, b) => b.id.localeCompare(a.id))
            }));
        };

        const renderHeader = () => `
            <header class="pt-8 pb-4 px-4 bg-slate-50 z-30 flex justify-between items-center relative">
                <div>
                    <p class="text-sm text-slate-500">Xin chào,</p>
                    <div class="flex items-center gap-2">
                        <p class="font-bold text-slate-800">Huy Chu <i class="ph-fill ph-hand-waving text-amber-500"></i></p>
                        <!-- Nút trạng thái đồng bộ -->
                        <span id="sync-status" class="w-2 h-2 rounded-full ${state.syncErrorMsg ? 'bg-rose-500' : 'bg-emerald-500'} transition-colors shadow-[0_0_8px_rgba(16,185,129,0.6)]" title="${state.syncErrorMsg || 'Kết nối ổn định'}"></span>
                        ${state.syncErrorMsg ? `<span class="text-[9px] text-rose-500 font-medium">${state.syncErrorMsg}</span>` : ''}
                    </div>
                </div>
            </header>`;

        // Navbar cố định dưới cùng
        const renderNav = () => `
            <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 px-6 py-4 flex justify-between items-center rounded-t-3xl shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] z-40">
                <button onclick="app.setTab('home')" class="flex flex-col items-center gap-1 transition-colors ${state.activeTab === 'home' ? 'text-indigo-600' : 'text-slate-400'}"><i class="${state.activeTab === 'home' ? 'ph-fill' : 'ph'} ph-house text-2xl"></i><span class="text-[10px] font-semibold">Tổng quan</span></button>
                <button onclick="app.setTab('wallets')" class="flex flex-col items-center gap-1 transition-colors ${state.activeTab === 'wallets' ? 'text-indigo-600' : 'text-slate-400'}"><i class="${state.activeTab === 'wallets' ? 'ph-fill' : 'ph'} ph-wallet text-2xl"></i><span class="text-[10px] font-semibold">Tài khoản</span></button>
                <button onclick="app.setTab('reports')" class="flex flex-col items-center gap-1 transition-colors ${state.activeTab === 'reports' ? 'text-indigo-600' : 'text-slate-400'}"><i class="${state.activeTab === 'reports' ? 'ph-fill' : 'ph'} ph-chart-bar text-2xl"></i><span class="text-[10px] font-semibold">Báo cáo</span></button>
            </nav>`;

        // Bộ lọc cho màn hình Tổng quan
        const renderFilterBar = () => `
            <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-100 mb-4 fade-in">
                <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                    <button onclick="app.setFilterPeriod('month')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${state.dashboardFilter.period === 'month' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Tháng này</button>
                    <button onclick="app.setFilterPeriod('week')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${state.dashboardFilter.period === 'week' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Tuần này</button>
                    <button onclick="app.setFilterPeriod('day')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${state.dashboardFilter.period === 'day' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Hôm nay</button>
                    <button onclick="app.setFilterPeriod('custom')" class="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors flex gap-1 items-center ${state.dashboardFilter.period === 'custom' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}"><i class="ph ph-calendar"></i> Tùy chọn</button>
                </div>
                ${state.dashboardFilter.period === 'custom' ? `
                    <div class="flex gap-2 mt-2 pt-2 border-t border-slate-100 fade-in">
                        <input type="date" id="f-start" value="${state.dashboardFilter.customStart}" onchange="app.updateCustomFilter()" class="flex-1 p-2 bg-slate-50 border border-slate-200 rounded text-xs focus:outline-none focus:border-indigo-300">
                        <span class="text-slate-400 self-center">-</span>
                        <input type="date" id="f-end" value="${state.dashboardFilter.customEnd}" onchange="app.updateCustomFilter()" class="flex-1 p-2 bg-slate-50 border border-slate-200 rounded text-xs focus:outline-none focus:border-indigo-300">
                    </div>
                ` : ''}
                <div class="mt-2 flex items-center gap-2">
                    <i class="ph ph-funnel text-slate-400"></i>
                    <select onchange="app.setFilterWallet(this.value)" class="flex-1 p-1.5 bg-transparent text-xs font-medium text-slate-600 focus:outline-none cursor-pointer">
                        <option value="all" ${state.dashboardFilter.walletId === 'all'?'selected':''}>Tất cả nguồn tiền</option>
                        ${state.wallets.filter(w=>w.status!=='deleted').map(w => `<option value="${w.id}" ${state.dashboardFilter.walletId === w.id?'selected':''}>${w.name}</option>`).join('')}
                    </select>
                </div>
            </div>`;

        const renderDashboard = () => {
            const stats = getStats();
            const catStats = getCategoryStats();
            const filteredTxs = filterTransactions(state.transactions, state.dashboardFilter);
            const grouped = getGroupedTransactions(filteredTxs);
            const overBudget = stats.totalExpense > stats.totalIncome * 0.7 && state.dashboardFilter.period === 'month';

            let html = `<div class="p-4 space-y-6 fade-in h-full overflow-y-auto">
                <div class="flex justify-between items-center mb-2 z-20 sticky top-0 bg-slate-50 py-2">
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Tài chính của tôi</h1>
                    <!-- Nút Thêm Giao dịch cố định On-Top -->
                    <button onclick="app.openAddTx()" class="flex items-center gap-1.5 bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all"><i class="ph-bold ph-plus text-lg"></i> <span class="text-sm font-semibold">Giao dịch</span></button>
                </div>

                <!-- Thẻ Tổng tài sản ròng ĐƯỢC THIẾT KẾ LẠI -->
                <div class="bg-slate-900 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden mt-0">
                    <div class="relative z-10 w-full">
                        <p class="text-slate-400 text-sm font-medium">Tổng tài sản ròng</p>
                        <h1 class="text-3xl font-bold mt-1 tracking-tight">${formatVND(stats.totalBalance)}</h1>
                        
                        <div class="flex gap-3 mt-5">
                            <div class="bg-slate-800 px-3 py-3 rounded-xl border border-slate-700 flex-1">
                                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold mb-1">Tổng chi (Tài khoản)</p>
                                <p class="text-slate-100 font-bold text-sm">${formatVND(stats.accountExpense)}</p>
                            </div>
                            <div class="bg-slate-800 px-3 py-3 rounded-xl border border-slate-700 flex-1">
                                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold mb-1">Dư nợ tín dụng</p>
                                <p class="text-rose-400 font-bold text-sm">${formatVND(stats.totalCredit)}</p>
                            </div>
                        </div>
                    </div>
                </div>

                ${renderFilterBar()}

                <!-- Tổng Thu & Chi -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div>
                        <div class="flex items-center text-emerald-500 text-xs font-bold uppercase tracking-wider mb-1"><i class="ph-bold ph-arrow-up-right mr-1"></i> TỔNG THU</div>
                        <p class="font-bold text-lg text-slate-800">${formatVND(stats.totalIncome)}</p>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center justify-end text-rose-500 text-xs font-bold uppercase tracking-wider mb-1"><i class="ph-bold ph-trend-down mr-1"></i> TỔNG CHI</div>
                        <p class="font-bold text-lg text-slate-800">${formatVND(stats.totalExpense)}</p>
                        <p class="text-[10px] text-slate-400 mt-1">TK: ${formatVND(stats.accountExpense)} | Thẻ: ${formatVND(stats.creditExpense)}</p>
                    </div>
                </div>

                <!-- Cảnh báo ngân sách -->
                ${overBudget ? `
                <div class="bg-orange-50 border border-orange-100 rounded-xl p-4 flex gap-3 items-start">
                    <i class="ph-fill ph-warning-circle text-orange-500 text-xl mt-0.5"></i>
                    <div>
                        <h4 class="text-orange-800 font-semibold text-sm">Cảnh báo ngân sách</h4>
                        <p class="text-orange-600 text-xs mt-1">Chi tiêu tháng này đã vượt 70% tổng thu. Nên cân đối lại.</p>
                    </div>
                </div>` : ''}

                <!-- Biểu đồ Cơ cấu chi tiêu -->
                <div>
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="ph-fill ph-chart-pie-slice mr-2 text-indigo-500 text-xl"></i>Cơ cấu chi tiêu</h3>
                    <div class="space-y-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        ${catStats.length === 0 ? '<p class="text-sm text-slate-500 text-center py-4">Chưa có dữ liệu chi tiêu.</p>' : ''}
                        ${catStats.map(stat => {
                            let walletDetails = '';
                            if(Object.keys(stat.byWallet).length > 0) {
                                walletDetails = `<div class="mt-2 space-y-1 pl-1 border-l-2 border-slate-100">` + 
                                Object.entries(stat.byWallet).map(([wId, amt]) => {
                                    const w = state.wallets.find(x=>x.id === wId);
                                    return `<div class="flex justify-between text-[10px] text-slate-500 font-medium"><span class="uppercase">Từ: ${w?w.name:'Đã xóa'}</span><span>${formatVND(amt)}</span></div>`;
                                }).join('') + `</div>`;
                            }

                            return `<div class="cursor-pointer hover:bg-slate-50 p-2 -mx-2 rounded-lg transition-colors" onclick="app.viewDetails('category', '${stat.category.id}')">
                                <div class="flex justify-between text-sm mb-2 font-bold text-slate-700">
                                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full ${stat.category.color}"></span> ${stat.category.name}</span>
                                    <span>${formatVND(stat.amount)}</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-1.5"><div class="${stat.category.color} h-1.5 rounded-full" style="width: ${stat.percentage}%"></div></div>
                                ${walletDetails}
                            </div>`;
                        }).join('')}
                    </div>
                </div>

                <!-- Lịch sử giao dịch -->
                <div>
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center"><i class="ph-fill ph-calendar-blank mr-2 text-indigo-500 text-xl"></i>Lịch sử giao dịch</h3>
                    <div class="space-y-4 pb-8">
                        ${grouped.length === 0 ? '<p class="text-center text-sm text-slate-500 mt-4 bg-white p-4 rounded-2xl border border-dashed">Chưa có giao dịch.</p>' : ''}
                        ${grouped.map(group => {
                            const [y, m, d] = group.date.split('-');
                            const dailyTotal = group.items.reduce((sum, t) => sum + (t.type === 'expense' ? -t.amount : t.amount), 0);
                            return `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                <div class="flex justify-between items-center bg-slate-50 px-4 py-2 border-b border-slate-100">
                                    <span class="font-semibold text-slate-700 text-xs">${d}/${m}/${y}</span>
                                    <span class="text-xs font-bold ${dailyTotal >= 0 ? 'text-emerald-600' : 'text-slate-800'}">${dailyTotal >= 0 ? '+' : ''}${formatVND(dailyTotal)}</span>
                                </div>
                                <div class="p-1">
                                    ${group.items.map(t => {
                                        const cat = state.categories.find(c => c.id === t.categoryId);
                                        const w = state.wallets.find(x => x.id === t.walletId);
                                        const isE = t.type === 'expense';

        const renderReports = () => {

            let periodLabel = 'Tháng này vs Tháng trước';
            
            if(state.dashboardFilter.period === 'day') {
                currStart = new Date(); currStart.setHours(0,0,0,0); currEnd = new Date(); currEnd.setHours(23,59,59,999);

                periodLabel = 'Hôm nay vs Hôm qua';
            } else if(state.dashboardFilter.period === 'week') {
                currStart = new Date(now); currStart.setDate(now.getDate() - now.getDay() + 1); currStart.setHours(0,0,0,0);
                currEnd = new Date(currStart); currEnd.setDate(currStart.getDate() + 6); currEnd.setHours(23,59,59,999);
                lastStart = new Date(currStart); lastStart.setDate(currStart.getDate() - 7);
                lastEnd = new Date(currEnd); lastEnd.setDate(currEnd.getDate() - 7);
                periodLabel = 'Tuần này vs Tuần trước';

                currStart = new Date(now.getFullYear(), 0, 1); currEnd = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
                lastStart = new Date(now.getFullYear()-1, 0, 1); lastEnd = new Date(now.getFullYear()-1, 11, 31, 23, 59, 59);
                periodLabel = 'Năm nay vs Năm trước';

                currStart = new Date(now.getFullYear(), now.getMonth(), 1); currEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
                lastStart = new Date(now.getFullYear(), now.getMonth() - 1, 1); lastEnd = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
            }

            let currExpense = 0, lastExpense = 0;
            const categoryDiff = {};
            const wFilter = state.dashboardFilter.walletId !== 'all' ? state.dashboardFilter.walletId : null;

            state.transactions.filter(t => t.type === 'expense').forEach(t => {
                if(wFilter && t.walletId !== wFilter) return;
                const txDate = new Date(`${t.date}T${t.time || '12:00'}:00`);
                const isCurr = txDate >= currStart && txDate <= currEnd;
                const isLast = txDate >= lastStart && txDate <= lastEnd;

                if (!categoryDiff[t.categoryId]) categoryDiff[t.categoryId] = { curr: 0, last: 0 };
                if (isCurr) { currExpense += t.amount; categoryDiff[t.categoryId].curr += t.amount; } 
                else if (isLast) { lastExpense += t.amount; categoryDiff[t.categoryId].last += t.amount; }
            });

            const details = Object.keys(categoryDiff).map(id => ({
                category: state.categories.find(c => c.id === id) || {name:'Ẩn'},
                curr: categoryDiff[id].curr, last: categoryDiff[id].last, diff: categoryDiff[id].curr - categoryDiff[id].last
            })).filter(d => d.curr > 0 || d.last > 0).sort((a,b) => b.diff - a.diff);

                            <p class="font-bold text-lg text-slate-500">${formatVND(lastExpense)}</p>
                        </div>
                    </div>

                </div>

            if(type === 'wallet') {
                const w = state.wallets.find(x => x.id === id);
                title = w ? w.name : 'Đã xóa'; subtitle = w && w.type === 'credit' ? 'Sao kê thẻ tín dụng' : 'Sao kê ví';
            } else {
                const c = state.categories.find(x => x.id === id);
                title = c ? c.name : 'Đã xóa'; subtitle = 'Chi tiết danh mục';
            }

            let filteredTxs = state.transactions;
            if(type === 'wallet') filteredTxs = filteredTxs.filter(t => t.walletId === id);
            else filteredTxs = filteredTxs.filter(t => t.categoryId === id);

            if(state.detailFilterPeriod !== 'all') {
                const now = new Date();
                filteredTxs = filteredTxs.filter(t => {
                    const d = new Date(t.date);
                    if(state.detailFilterPeriod === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    if(state.detailFilterPeriod === 'year') return d.getFullYear() === now.getFullYear();
                    return true;
                });
            }

            const grouped = getGroupedTransactions(filteredTxs);
            const totalE = filteredTxs.reduce((sum, t) => sum + (t.type === 'expense' ? t.amount : 0), 0);
            const totalI = filteredTxs.reduce((sum, t) => sum + (t.type === 'income' ? t.amount : 0), 0);

            return `<div class="p-4 bg-slate-50 h-full overflow-y-auto pb-24 fade-in z-50 absolute inset-0">
                <div class="flex items-center gap-3 mb-4 bg-white p-4 -mx-4 -mt-4 shadow-sm sticky top-0 z-10">
                    <button onclick="app.closeDetails()" class="p-2 bg-slate-100 hover:bg-slate-200 transition-colors rounded-full text-slate-600"><i class="ph-bold ph-arrow-left text-xl"></i></button>
                    <div><h2 class="text-lg font-bold text-slate-800 uppercase tracking-tight">${title}</h2><p class="text-[10px] font-semibold text-slate-500 uppercase">${subtitle}</p></div>
                </div>

                <div class="flex gap-2 mb-4 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                    <button onclick="app.setDetailFilter('all')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ${state.detailFilterPeriod === 'all' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Tất cả</button>
                    <button onclick="app.setDetailFilter('month')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ${state.detailFilterPeriod === 'month' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Tháng này</button>
                    <button onclick="app.setDetailFilter('year')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ${state.detailFilterPeriod === 'year' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500 hover:bg-slate-50'}">Năm nay</button>
                </div>
                
                <div class="flex justify-between bg-slate-800 text-white p-4 rounded-2xl mb-4 shadow-md">
                    <div><p class="text-[10px] text-slate-400 uppercase font-semibold">Tổng Thu</p><p class="font-bold text-emerald-400">${formatVND(totalI)}</p></div>
                    <div class="text-right"><p class="text-[10px] text-slate-400 uppercase font-semibold">Tổng Chi</p><p class="font-bold text-rose-400">${formatVND(totalE)}</p></div>
                </div>

                <div class="space-y-3">
                    ${grouped.length === 0 ? '<p class="text-center text-sm text-slate-500 pt-8">Không có giao dịch nào.</p>' : ''}
                    ${grouped.map(group => {
                        const [y, m, d] = group.date.split('-');
                        const dTotal = group.items.reduce((sum, t) => sum + (t.type === 'expense' ? -t.amount : t.amount), 0);
                        return `<div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                            <div class="flex justify-between items-center bg-slate-50 px-3 py-2 border-b border-slate-100">
                                <span class="font-bold text-slate-600 text-xs">${d}/${m}/${y}</span>
                                <span class="text-xs font-bold ${dTotal >= 0 ? 'text-emerald-600' : 'text-slate-800'}">${dTotal >= 0 ? '+' : ''}${formatVND(dTotal)}</span>
                            </div>
                            <div class="p-1">
                                ${group.items.map(t => {
                                    const cat = state.categories.find(c => c.id === t.categoryId);
                                    const w = state.wallets.find(x => x.id === t.walletId);
                                    const isE = t.type === 'expense';
                                    return `<div onclick="app.editTx('${t.id}')" class="flex items-center justify-between p-3 border-b border-slate-50 last:border-0 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-white ${cat?cat.color:'bg-slate-400'} text-xs"><i class="ph-bold ${isE?'ph-trend-down':'ph-trend-up'}"></i></div>
                                            <div><p class="font-bold text-slate-800 text-xs">${t.note || (cat?cat.name:'')}</p><p class="text-[9px] text-slate-400 font-medium uppercase">${t.time||'--:--'} • ${type==='wallet'?(cat?cat.name:''):(w?w.name:'')}</p></div>
                                        </div>
                                        <p class="font-bold text-xs ${isE ? 'text-slate-800' : 'text-emerald-600'}">${isE ? '-' : '+'}${formatVND(t.amount)}</p>
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        };

        window.app = {
            render() {
                const root = document.getElementById('app-root');
                if (!state.isDataLoaded) return;
                
                let html = '';
                if(state.viewingEntity.type) {
                    html = renderDetailsView();
                } else {
                    html = renderHeader();
                    if (state.activeTab === 'home') html += renderDashboard();
                    else if (state.activeTab === 'add') html += renderAddTx();
                    else if (state.activeTab === 'wallets') html += renderWallets();
                    else if (state.activeTab === 'add-wallet') html += renderAddWallet();
                    else if (state.activeTab === 'reports') html += renderReports();
                    
                    if (!['add', 'add-wallet'].includes(state.activeTab)) html += renderNav(); 
                }
                root.innerHTML = html;
            },
            
            setTab(t) { state.activeTab = t; this.render(); },
            setFilterPeriod(p) { state.dashboardFilter.period = p; this.render(); },
            setFilterWallet(wId) { state.dashboardFilter.walletId = wId; this.render(); },
            updateCustomFilter() {
                state.dashboardFilter.customStart = document.getElementById('f-start')?.value || '';
                state.dashboardFilter.customEnd = document.getElementById('f-end')?.value || '';
                this.render();
            },
            viewDetails(type, id) { state.viewingEntity = { type, id }; state.detailFilterPeriod = 'all'; this.render(); },
            closeDetails() { state.viewingEntity = { type: null, id: null }; this.render(); },
            setDetailFilter(p) { state.detailFilterPeriod = p; this.render(); },

            openAddTx() {
                state.txForm = { id: null, type: 'expense', amount: '', date: new Date().toISOString().split('T')[0], time: new Date().toTimeString().slice(0,5), walletId: '', categoryId: '', note: '', hasImage: false };
                state.confirmingDeleteTxId = null;
                this.setTab('add');
            },
            setTxType(t) { state.txForm.type = t; state.txForm.categoryId = ''; this.render(); },
            setTxCat(id) { state.txForm.categoryId = id; this.render(); },
            toggleImage() { state.txForm.hasImage = !state.txForm.hasImage; this.render(); },
            updateFormState() {
                state.txForm.amount = document.getElementById('t-amt')?.value || '';
                state.txForm.date = document.getElementById('t-date')?.value || '';
                state.txForm.time = document.getElementById('t-time')?.value || '';
                state.txForm.walletId = document.getElementById('t-wallet')?.value || '';
                state.txForm.note = document.getElementById('t-note')?.value || '';
            },
            editTx(id) {
                const t = state.transactions.find(x => x.id === id);
                if(t) { 
                    state.txForm = {...t}; 
                    state.viewingEntity = { type: null, id: null };
                    this.setTab('add'); 
                }
            },
            
            showAddCategory() { document.getElementById('new-cat-box').classList.toggle('hidden'); },
            async saveNewCategory() {
                const name = document.getElementById('t-newcat').value.trim();
                if(!name) return;
                const colors = ['bg-pink-500', 'bg-cyan-500', 'bg-lime-500', 'bg-indigo-500', 'bg-teal-500'];
                const newCat = { id: `c${Date.now()}`, name, type: state.txForm.type, color: colors[Math.floor(Math.random()*colors.length)] };
                const updatedCats = [...state.categories, newCat];
                try {
                    await db.collection('users').doc(state.userId).set({ categories: updatedCats }, { merge: true });
                    state.txForm.categoryId = newCat.id;
                } catch(e) { console.error(e); }
            },

            openAddWallet() {
                state.walletForm = { id: null, type: 'cash', name: '', balance: '', limit: '', includeInNet: true };
                state.confirmingDeleteWalletId = null;
                this.setTab('add-wallet');
            },
            setWalletType(t) { state.walletForm.type = t; this.render(); },
            updateWalletForm() {
                state.walletForm.name = document.getElementById('w-name')?.value || '';
                state.walletForm.balance = document.getElementById('w-balance')?.value || '';
                state.walletForm.limit = document.getElementById('w-limit')?.value || '';
                const chk = document.getElementById('w-include');
                if(chk) state.walletForm.includeInNet = chk.checked;
            },
            editWallet(id) {
                const w = state.wallets.find(x => x.id === id);
                if(w) { state.walletForm = {...w, balance: Math.abs(w.balance), includeInNet: w.includeInNet !== false}; this.setTab('add-wallet'); }
            },

            async saveTx() {
                this.updateFormState();
                if (!state.txForm.amount || !state.txForm.walletId) return;
                
                const amt = parseInt(state.txForm.amount.toString().replace(/,/g, '')) || 0;
                
                let updatedWallets = JSON.parse(JSON.stringify(state.wallets)); 
                let updatedTxs = [...state.transactions];

                if (state.txForm.id) {
                    const oldTx = state.transactions.find(t => t.id === state.txForm.id);
                    if (oldTx) {
                        const wOld = updatedWallets.find(w => w.id === oldTx.walletId);
                        if(wOld) {
                            wOld.balance += (oldTx.type === 'expense' ? oldTx.amount : -oldTx.amount);
                        }
                        updatedTxs = updatedTxs.filter(t => t.id !== state.txForm.id);
                    }
                }
                
                const wNew = updatedWallets.find(w => w.id === state.txForm.walletId);
                if(wNew) {
                    wNew.balance += (state.txForm.type === 'income' ? amt : -amt);
                }
                
                updatedTxs.push({ ...state.txForm, id: state.txForm.id || `t${Date.now()}`, amount: amt });

                try {
                    await db.collection('users').doc(state.userId).set({ wallets: updatedWallets, transactions: updatedTxs }, { merge: true });
                    this.setTab('home');
                } catch(e) { alert("Lỗi khi lưu!"); console.error(e); }
            },

            async deleteTx() {
                const id = state.txForm.id;
                if(!id) return;
                if(state.confirmingDeleteTxId !== id) { state.confirmingDeleteTxId = id; this.render(); return; }
                
                const tx = state.transactions.find(t => t.id === id);
                let updatedWallets = JSON.parse(JSON.stringify(state.wallets));
                if(tx) {
                    const w = updatedWallets.find(x => x.id === tx.walletId);
                    if(w) w.balance += (tx.type === 'expense' ? tx.amount : -tx.amount);
                }
                
                try {
                    await db.collection('users').doc(state.userId).set({ wallets: updatedWallets, transactions: state.transactions.filter(t => t.id !== id) }, { merge: true });
                    this.setTab('home');
                } catch(e) { alert("Lỗi khi xóa!"); }
            },

            async saveWallet() {
                this.updateWalletForm();
                if(!state.walletForm.name || state.walletForm.balance === '') return;
                
                let bal = parseInt(state.walletForm.balance.toString().replace(/,/g,'')) || 0;
                let lim = parseInt(state.walletForm.limit.toString().replace(/,/g,'')) || 0;
                
                if(state.walletForm.type === 'credit') bal = -Math.abs(bal);
                else bal = Math.abs(bal);
                
                let updatedWallets = [...state.wallets];
                if (state.walletForm.id) {
                    const idx = updatedWallets.findIndex(w => w.id === state.walletForm.id);
                    if (idx > -1) updatedWallets[idx] = { ...updatedWallets[idx], name: state.walletForm.name, type: state.walletForm.type, balance: bal, limit: lim, includeInNet: state.walletForm.includeInNet };
                } else {
                    updatedWallets.push({ id: `w${Date.now()}`, name: state.walletForm.name, type: state.walletForm.type, balance: bal, limit: lim, includeInNet: state.walletForm.includeInNet, status: 'active' });
                }

                try {
                    await db.collection('users').doc(state.userId).set({ wallets: updatedWallets }, { merge: true });
                    this.setTab('wallets');
                } catch(e) { alert("Lỗi khi lưu Ví!"); }
            },

            async toggleLockWallet(id) {
                let updatedWallets = state.wallets.map(w => w.id === id ? {...w, status: w.status === 'locked' ? 'active' : 'locked'} : w);
                try { await db.collection('users').doc(state.userId).set({ wallets: updatedWallets }, { merge: true }); } catch(e) {}
            },

            async deleteWallet(id) {
                if(state.confirmingDeleteWalletId !== id) { state.confirmingDeleteWalletId = id; this.render(); return; }
                let updatedWallets = state.wallets.map(w => w.id === id ? {...w, status: 'deleted'} : w);
                try { await db.collection('users').doc(state.userId).set({ wallets: updatedWallets }, { merge: true }); } catch(e) {}
            }
        };

        async function initApp() {
            try {
                // Tải từ Cache để chống màn hình trắng
                const localData = localStorage.getItem('finance_cache');
                if (localData) {
                    const data = JSON.parse(localData);
                    state.wallets = data.wallets || [];
                    state.transactions = data.transactions || [];
                    state.categories = data.categories || defaultCategories;
                } else {
                    state.categories = defaultCategories;
                }
                
                state.isDataLoaded = true;
                const loader = document.getElementById('loader');
                if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 300); }
                window.app.render();

                const docRef = db.collection('users').doc(state.userId);
                
                docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        state.wallets = data.wallets || [];
                        state.transactions = data.transactions || [];
                        state.categories = data.categories && data.categories.length > 0 ? data.categories : defaultCategories;
                        
                        localStorage.setItem('finance_cache', JSON.stringify({ wallets: state.wallets, transactions: state.transactions, categories: state.categories }));
                        
                        state.syncErrorMsg = '';
                        window.app.render();
                    } else {
                        docRef.set({ wallets: [], transactions: [], categories: defaultCategories });
                    }
                }, (error) => {
                    console.error("Lỗi Firebase:", error);
                    state.syncErrorMsg = 'Lỗi kết nối';
                    window.app.render();
                });

            } catch(e) {
                console.error("Lỗi mạng:", e);
                state.syncErrorMsg = 'Mất kết nối';
                window.app.render();
            }
        }

        initApp();
    </script>
</body>
</html>
